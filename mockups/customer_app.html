<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mockup - Customer Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  </style>
</head>
<body class="flex justify-center min-h-screen">
  
  <!-- Mobile Container -->
  <div class="w-full max-w-md bg-white min-h-screen relative shadow-2xl flex flex-col">
    
    <!-- Header Cover -->
    <div class="relative h-48 bg-gray-900 w-full">
      <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover opacity-80" alt="Cover">
      
      <!-- Top Actions -->
      <div class="absolute top-4 w-full px-4 flex justify-between">
        <button class="w-10 h-10 rounded-full glass flex items-center justify-center text-gray-800 shadow">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <button class="w-10 h-10 rounded-full glass flex items-center justify-center text-gray-800 shadow">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
      </div>

      <!-- Shop Info -->
      <div class="absolute -bottom-6 left-4 flex items-end gap-3">
        <div class="w-20 h-20 rounded-2xl bg-amber-600 border-4 border-white shadow-lg flex items-center justify-center text-white text-2xl font-bold">
          TC
        </div>
        <div class="mb-2">
          <h1 class="text-2xl font-bold text-white drop-shadow-md">The Coffee House</h1>
          <p class="text-xs text-white/90 drop-shadow flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-400"></span> Đang mở cửa • Bàn 12
          </p>
        </div>
      </div>
    </div>

    <!-- Sticky Category Bar -->
    <div class="sticky top-0 z-10 glass border-b border-gray-100 mt-8">
      <div class="flex overflow-x-auto px-4 py-3 gap-2 hide-scrollbar">
        <button class="px-4 py-1.5 rounded-full bg-amber-600 text-white font-medium text-sm whitespace-nowrap shadow-md">Tất cả</button>
        <button class="px-4 py-1.5 rounded-full bg-white text-gray-600 font-medium text-sm whitespace-nowrap border">Cà phê</button>
        <button class="px-4 py-1.5 rounded-full bg-white text-gray-600 font-medium text-sm whitespace-nowrap border">Trà sữa</button>
        <button class="px-4 py-1.5 rounded-full bg-white text-gray-600 font-medium text-sm whitespace-nowrap border">Bánh ngọt</button>
      </div>
    </div>

    <!-- Menu List -->
    <div class="flex-1 p-4 pb-24 overflow-y-auto">
      <h2 class="font-bold text-lg mb-4 text-gray-800">Cà phê (3)</h2>
      
      <!-- Item 1 -->
      <div class="flex gap-4 mb-6 bg-white p-3 rounded-xl shadow-sm border border-gray-50">
        <img src="https://images.unsplash.com/photo-1578314675249-a6910f80cc4e?auto=format&fit=crop&q=80&w=200" class="w-24 h-24 rounded-lg object-cover" alt="Item">
        <div class="flex-1 flex flex-col justify-between">
          <div>
            <h3 class="font-bold text-gray-900 leading-tight">Cà Phê Sữa Đá Bạc Xỉu</h3>
            <p class="text-xs text-gray-500 mt-1 line-clamp-2">Đậm đà hương vị cà phê Robusta pha cùng sữa đặc.</p>
          </div>
          <div class="flex items-center justify-between mt-2">
            <span class="font-bold text-amber-600">35,000đ</span>
            <button class="w-8 h-8 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center hover:bg-amber-600 hover:text-white transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Item 2 -->
      <div class="flex gap-4 mb-6 bg-white p-3 rounded-xl shadow-sm border border-gray-50">
        <div class="w-24 h-24 rounded-lg bg-gray-100 flex items-center justify-center text-4xl">☕</div>
        <div class="flex-1 flex flex-col justify-between">
          <div>
            <h3 class="font-bold text-gray-900 leading-tight">Cà Phê Đen Đá</h3>
            <span class="inline-block px-2 py-0.5 rounded text-[10px] font-bold bg-red-100 text-red-600 mb-1">MÓN MỚI</span>
          </div>
          <div class="flex items-center justify-between mt-2">
            <span class="font-bold text-amber-600">29,000đ</span>
            <button class="w-8 h-8 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- Floating Cart Bar -->
    <div class="absolute bottom-6 left-0 w-full px-4">
      <button class="w-full bg-amber-600 text-white rounded-2xl p-4 flex items-center justify-between shadow-xl hover:bg-amber-700 transition-colors">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center font-bold">2</div>
          <span class="font-semibold text-lg">64,000đ</span>
        </div>
        <span class="font-bold">Xem giỏ hàng →</span>
      </button>
    </div>

  </div>
  
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</body>
</html>
